<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólio de Vídeos UGC | Tati Ribeiro</title>
<meta name="description" content="Portfólio de vídeos UGC de Tati Ribeiro, criadora de conteúdo. Em breve, vídeos completos por nicho.">

<!-- Fontes do Google Fonts (única fonte externa permitida) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     VARIÁVEIS DE DESIGN (paleta, fontes, espaçamentos)
     As mesmas usadas em index.html, para manter a identidade visual.
     ============================================================ */
  :root{
    --creme: #f3eee9;
    --creme-escuro: #e7ded4;
    --tinta: #14110d;
    --azul: #0049a4;
    --azul-escuro: #003576;
    --laranja: #df7900;
    --branco: #ffffff;
    --borda: rgba(20,17,13,0.12);
    --sombra: 0 10px 30px rgba(20,17,13,0.08);
    --sombra-forte: 0 20px 45px rgba(20,17,13,0.14);
    --fonte-titulo: 'Fraunces', serif;
    --fonte-corpo: 'Plus Jakarta Sans', sans-serif;
    --raio: 18px;
    --raio-pequeno: 10px;
    --container: 1180px;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior: auto; }
    *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  body{
    margin:0;
    background: var(--creme);
    color: var(--tinta);
    font-family: var(--fonte-corpo);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  img, svg{ max-width: 100%; display:block; }
  a{ color: inherit; text-decoration: none; }

  h1,h2,h3,h4{
    font-family: var(--fonte-titulo);
    font-weight: 500;
    line-height: 1.15;
    margin: 0 0 0.5em 0;
    letter-spacing: -0.01em;
  }
  h1 em, h2 em, h3 em{ font-style: italic; font-weight: 400; color: var(--azul); }

  p{ margin: 0 0 1em 0; }

  .container{
    width: 100%;
    max-width: var(--container);
    margin: 0 auto;
    padding: 0 24px;
  }

  section{ padding: 88px 0; }
  @media (max-width: 768px){ section{ padding: 64px 0; } }

  .rotulo-secao{
    display:inline-block;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--azul);
    margin-bottom: 14px;
  }

  .botao{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding: 15px 30px;
    border-radius: 100px;
    font-family: var(--fonte-corpo);
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease, color 0.25s ease;
  }
  .botao:hover{ transform: translateY(-2px); }
  .botao:focus-visible{ outline: 3px solid var(--azul); outline-offset: 3px; }

  .botao-primario{ background: var(--tinta); color: var(--creme); }
  .botao-primario:hover{ background: var(--azul); box-shadow: var(--sombra-forte); }

  .botao-secundario{ background: transparent; border-color: var(--tinta); color: var(--tinta); }
  .botao-secundario:hover{ background: var(--tinta); color: var(--creme); }

  .botao-laranja{ background: var(--laranja); color: var(--branco); }
  .botao-laranja:hover{ background: #c26800; box-shadow: var(--sombra-forte); }

  /* ============================================================
     ANIMAÇÃO DE ENTRADA (fade + subida leve via IntersectionObserver)
     ============================================================ */
  .revelar{
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.8s cubic-bezier(.22,.61,.36,1), transform 0.8s cubic-bezier(.22,.61,.36,1);
  }
  .revelar.visivel{ opacity: 1; transform: translateY(0); }

  /* ============================================================
     CABEÇALHO / MENU
     ============================================================ */
  .cabecalho{
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(243,238,233,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--borda);
  }
  .cabecalho-conteudo{
    display:flex;
    align-items:center;
    justify-content:space-between;
    height: 78px;
  }
  .logo{
    font-family: var(--fonte-titulo);
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .logo em{ color: var(--azul); font-style: italic; }

  .nav-desktop{ display:flex; align-items:center; gap: 36px; }
  .nav-desktop a{
    font-size: 0.92rem;
    font-weight: 600;
    position: relative;
    padding: 4px 2px;
  }
  .nav-desktop a::after{
    content:'';
    position:absolute; left:0; bottom:-4px;
    width:0; height:2px; background: var(--laranja);
    transition: width 0.3s ease;
  }
  .nav-desktop a:hover::after, .nav-desktop a:focus-visible::after{ width:100%; }
  .nav-desktop a:focus-visible{ outline: 3px solid var(--azul); outline-offset: 4px; border-radius: 4px; }
  .nav-desktop a.ativo::after{ width:100%; background: var(--azul); }

  .nav-cta{ display:flex; align-items:center; gap: 20px; }

  .botao-menu{
    display:none;
    flex-direction: column;
    justify-content:center;
    gap:5px;
    width: 42px; height: 42px;
    background: transparent;
    border: 1px solid var(--borda);
    border-radius: var(--raio-pequeno);
    cursor:pointer;
  }
  .botao-menu span{
    display:block;
    width: 20px; height: 2px;
    background: var(--tinta);
    margin: 0 auto;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .botao-menu:focus-visible{ outline: 3px solid var(--azul); outline-offset: 3px; }
  .botao-menu.aberto span:nth-child(1){ transform: translateY(7px) rotate(45deg); }
  .botao-menu.aberto span:nth-child(2){ opacity: 0; }
  .botao-menu.aberto span:nth-child(3){ transform: translateY(-7px) rotate(-45deg); }

  .nav-mobile{
    display:none;
    position: fixed;
    top: 78px; left:0; right:0; bottom:0;
    background: var(--creme);
    padding: 32px 24px;
    flex-direction: column;
    gap: 6px;
    overflow-y:auto;
  }
  .nav-mobile.aberto{ display:flex; }
  .nav-mobile a{
    font-family: var(--fonte-titulo);
    font-size: 1.6rem;
    padding: 14px 4px;
    border-bottom: 1px solid var(--borda);
  }
  .nav-mobile .nav-cta{ margin-top: 20px; flex-direction: column; align-items:stretch; }
  .nav-mobile .botao{ width: 100%; }

  @media (max-width: 900px){
    .nav-desktop{ display:none; }
    .nav-cta > .botao{ display:none; }
    .botao-menu{ display:flex; }
  }

  /* ============================================================
     INTRODUÇÃO DA PÁGINA DE VÍDEOS
     ============================================================ */
  .intro-videos{
    padding-top: 168px;
    padding-bottom: 40px;
  }
  .intro-videos-conteudo{ max-width: 640px; }
  .intro-videos h1{ font-size: clamp(2.2rem, 4.5vw, 3.2rem); }
  .intro-videos p{ font-size: 1.08rem; color: rgba(20,17,13,0.78); }
  .intro-videos-acoes{ display:flex; gap:16px; flex-wrap:wrap; margin-top: 24px; }

  @media (max-width: 900px){ .intro-videos{ padding-top: 140px; } }

  /* ============================================================
     GALERIA DE VÍDEOS, ORGANIZADA POR NICHO
     Cada nicho é uma faixa horizontal com scroll (arraste ou use as setas).
     ============================================================ */
  .nicho-videos{ margin-bottom: 52px; }
  .nicho-videos:last-child{ margin-bottom: 0; }
  .nicho-titulo{ font-size: 1.3rem; margin-bottom: 20px; }

  .video-scroll-wrap{ position:relative; }
  .video-track{
    display:flex;
    gap: 16px;
    overflow-x: auto;
    scroll-snap-type: x proximity;
    scroll-behavior: smooth;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .video-track::-webkit-scrollbar{ display:none; }

  .video-item{
    flex: 0 0 190px;
    aspect-ratio: 9/16;
    border-radius: var(--raio);
    box-shadow: var(--sombra);
    position:relative;
    overflow:hidden;
    background: var(--tinta);
    scroll-snap-align: start;
  }
  .video-foto{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit: cover;
    background: var(--tinta);
    border: 0;
    z-index:0;
  }

  /* Card "fachada": mostra a capa do vídeo com um botão de play simples,
     sem nenhuma marca do YouTube. Só carrega o player de verdade ao clicar. */
  .video-card{
    all: unset;
    box-sizing: border-box;
    position:absolute;
    inset:0;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .video-card-thumb{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit: cover;
  }
  .video-card::after{
    content:'';
    position:absolute;
    inset:0;
    background: linear-gradient(to top, rgba(20,17,13,0.4) 0%, rgba(20,17,13,0.05) 55%);
    pointer-events:none;
  }
  .video-card-play{
    position:relative;
    z-index:2;
    width: 54px; height: 54px;
    border-radius: 50%;
    background: rgba(255,255,255,0.92);
    color: var(--tinta);
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform 0.25s ease, background 0.25s ease;
  }
  .video-card:hover .video-card-play,
  .video-card:focus-visible .video-card-play{ transform: scale(1.08); background: var(--branco); }
  .video-card:focus-visible{ outline: 3px solid var(--azul); outline-offset: 3px; }

  .scroll-seta{
    display:flex;
    align-items:center;
    justify-content:center;
    position:absolute;
    top:50%;
    transform: translateY(-50%);
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--branco);
    border: 1px solid var(--borda);
    box-shadow: var(--sombra);
    color: var(--tinta);
    cursor:pointer;
    z-index: 3;
    transition: background 0.25s ease, color 0.25s ease, opacity 0.2s ease;
  }
  .scroll-seta:hover{ background: var(--tinta); color: var(--creme); }
  .scroll-seta:focus-visible{ outline: 3px solid var(--azul); outline-offset: 2px; }
  .scroll-seta-esq{ left: -8px; }
  .scroll-seta-dir{ right: -8px; }
  .scroll-seta[hidden]{ display:none; }

  @media (max-width: 700px){
    .video-item{ flex-basis: 42vw; }
    .scroll-seta{ display:none; }
  }

  /* ============================================================
     RODAPÉ
     ============================================================ */
  .rodape{
    background: var(--tinta);
    color: rgba(243,238,233,0.85);
    padding: 56px 0 28px 0;
  }
  .rodape-topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap: 24px;
    padding-bottom: 32px;
    border-bottom: 1px solid rgba(243,238,233,0.15);
  }
  .rodape-logo{ font-family: var(--fonte-titulo); font-size: 1.5rem; color: var(--creme); }
  .rodape-logo em{ font-style: italic; color: var(--laranja); }
  .rodape-social{ display:flex; gap: 14px; }
  .rodape-social a{
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1px solid rgba(243,238,233,0.3);
    display:flex; align-items:center; justify-content:center;
    transition: background 0.25s ease, transform 0.25s ease;
  }
  .rodape-social a:hover{ background: var(--azul); transform: translateY(-3px); border-color: var(--azul); }
  .rodape-social a:focus-visible{ outline: 3px solid var(--laranja); outline-offset: 3px; }
  .rodape-baixo{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap: 10px;
    padding-top: 24px;
    font-size: 0.82rem;
    color: rgba(243,238,233,0.55);
  }

  @media (max-width: 640px){ .rodape-topo, .rodape-baixo{ flex-direction:column; text-align:center; } }

  .pular-link{
    position:absolute; left:-999px; top:auto;
    background: var(--azul); color: var(--branco);
    padding: 12px 18px; border-radius: 8px; z-index: 2000;
  }
  .pular-link:focus{ left: 16px; top: 16px; }
</style>
</head>
<body>

<a class="pular-link" href="#conteudo-principal">Pular para o conteúdo principal</a>

<!-- Cabeçalho igual ao do site principal, montado via JS a partir do CONFIG abaixo -->
<header class="cabecalho">
  <div class="container cabecalho-conteudo">

    <nav class="nav-desktop" id="nav-desktop" aria-label="Navegação principal"></nav>
    <div class="nav-cta">
      <a class="botao botao-primario" id="cta-cabecalho" href="index.html#contato">Fale comigo</a>

    </div>
  </div>
  <nav class="nav-mobile" id="nav-mobile" aria-label="Navegação móvel"></nav>
</header>

<main id="conteudo-principal">

  <!-- INTRODUÇÃO DA PÁGINA -->
  <section class="intro-videos">
    <div class="container">
      <div class="intro-videos-conteudo revelar">
        <span class="rotulo-secao">Portfólio de vídeos</span>
        <h1>Vídeos <em>UGC</em> por nicho</h1>
        <p>Esta página vai reunir os vídeos UGC completos entregues para marcas parceiras, organizados por nicho. As fotos dos trabalhos continuam na página principal do portfólio.</p>
        <div class="intro-videos-acoes">
          <a href="index.html#portfolio" class="botao botao-secundario">Ver portfólio de fotos</a>

  <!-- GALERIA DE VÍDEOS, UM BLOCO POR NICHO -->
  <section id="galeria-videos">

      <div id="nichos-videos"></div>
    </div>
  </section>

</main>

<!-- RODAPÉ igual ao do site principal -->
<footer class="rodape">
  <div class="container">
    <div class="rodape-topo">
      <span class="rodape-logo" id="rodape-logo"></span>
      <div class="rodape-social" id="rodape-social"></div>
    </div>
    <div class="rodape-baixo">
      <span id="rodape-nome-direitos"></span>
      <span id="rodape-copyright"></span>
    </div>
  </div>
</footer>

<script>
  /* ============================================================================================
     CONFIGURAÇÃO DESTA PÁGINA
     Mantém os mesmos dados reais usados em index.html (nome, contato, redes sociais).
     ============================================================================================ */
  const CONFIG = {
    // EDITE AQUI: nome exibido no menu e no rodapé
    nome: "Tati Ribeiro",
    primeiroNome: "Tati",
    profissao: "Criadora de Conteúdo UGC",

    // EDITE AQUI: dados de contato reais (iguais aos de index.html)
    contato: {
      email: "contatougc.tatiribeiro@gmail.com",
      whatsappNumero: "5519974198574",
      instagramUsuario: "@ugc.tatiribeiro",
      instagramUrl: "https://instagram.com/ugc.tatiribeiro"
    },

    // EDITE AQUI: links do menu (voltam para as seções da página principal, index.html)
    navegacao: [
      { texto: "Início", href: "index.html" },
      { texto: "Portfólio de fotos", href: "index.html#portfolio" },
      { texto: "Vídeos UGC", href: "videos.html" },
      { texto: "Serviços", href: "index.html#servicos" },
      { texto: "Contato", href: "index.html#contato" }
    ],

    // EDITE AQUI: vídeos UGC, organizados por nicho. Cada nicho vira um bloco na página,
    // com o título do nicho em cima e os vídeos lado a lado (arraste ou use as setas
    // para ver mais, sem precisar trocar de página).
    // Cada vídeo precisa de um "youtubeId": o código do vídeo no YouTube, que é a parte
    // final do link, depois de "shorts/" ou "watch?v=". Exemplo:
    //   https://www.youtube.com/shorts/T6X4J4uYdYQ  ->  youtubeId: "T6X4J4uYdYQ"
    // Para adicionar um vídeo novo num nicho existente, adicione uma linha na lista
    // "videos" dele. Para criar um nicho novo, copie um bloco inteiro e troque o "nicho".
    videosPorNicho: [
      {
        nicho: "Pet",
        videos: [
          { youtubeId: "0i2ZFRrx0Cg" },
          { youtubeId: "Owc3PnPbOkY" },
          { youtubeId: "q2CkbyxZGv8" },
          { youtubeId: "-qoS9D5oUJs" }
        ]
      },
      {
        nicho: "Casa e Limpeza",
        videos: [
          { youtubeId: "1unCG49vObc" },
          { youtubeId: "rfsXdrQ3GWA" },
          { youtubeId: "iZKODStY1mM" },
          { youtubeId: "4YFLYX1zwLc" },
          { youtubeId: "uBdbW68OeYo" }
        ]
      },
      {
        nicho: "Haircare",
        videos: [
          { youtubeId: "3gEzz8Rir-k" },
          { youtubeId: "kHodjMdDAfQ" },
          { youtubeId: "T759fFIfshY" },
          { youtubeId: "DE13lRXO3Ng" }
        ]
      },
      {
        nicho: "Skincare",
        videos: [
          { youtubeId: "T6X4J4uYdYQ" },
          { youtubeId: "AmtVkRfbOzw" },
          { youtubeId: "Z8S-dDvCah0" },
          { youtubeId: "R5KCgbtnYJc" }
        ]
      },
      {
        nicho: "Lifestyle",
        videos: [
          { youtubeId: "ms8_RtA5N1c" },
          { youtubeId: "tNqnPAUQdtU" }
        ]
      }
    ]
  };

  /* ============================================================================================
     RENDERIZAÇÃO
     ============================================================================================ */
  const ICONE_PLAY = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 7l9 5-9 5V7z" fill="currentColor"/></svg>';

  function montarCabecalho(){
    document.getElementById('logo-cabecalho').innerHTML = `${CONFIG.primeiroNome} <em>Ribeiro</em>`;
    document.getElementById('rodape-logo').innerHTML = `${CONFIG.primeiroNome} <em>Ribeiro</em>`;

    const montarLink = item => {
      const ativo = item.href === 'videos.html' ? ' class="ativo"' : '';
      return `<a href="${item.href}"${ativo}>${item.texto}</a>`;
    };

    document.getElementById('nav-desktop').innerHTML = CONFIG.navegacao.map(montarLink).join('');
    document.getElementById('nav-mobile').innerHTML = CONFIG.navegacao.map(montarLink).join('')
      + `<div class="nav-cta"><a class="botao botao-primario" href="index.html#contato">Fale comigo</a></div>`;
  }

  const ICONE_SETA_ESQ = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>';
  const ICONE_SETA_DIR = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>';

  function montarGaleriaVideos(){
    const container = document.getElementById('nichos-videos');

    container.innerHTML = CONFIG.videosPorNicho.map((bloco, indiceBloco) => {
      const idTrack = `nicho-track-${indiceBloco}`;
      const cards = bloco.videos.map((video, indiceVideo) => `
        <div class="video-item revelar">
          <button type="button" class="video-card" data-youtube="${video.youtubeId}" data-titulo="${bloco.nicho} ${indiceVideo + 1}" aria-label="Assistir vídeo ${indiceVideo + 1} de ${bloco.nicho}">
            <img class="video-card-thumb" src="https://i.ytimg.com/vi/${video.youtubeId}/hqdefault.jpg" alt="" loading="lazy">
            <span class="video-card-play" aria-hidden="true">${ICONE_PLAY}</span>
          </button>
        </div>
      `).join('');

      return `
        <div class="nicho-videos revelar">
          <h3 class="nicho-titulo">${bloco.nicho}</h3>
          <div class="video-scroll-wrap">
            <button type="button" class="scroll-seta scroll-seta-esq" data-alvo="${idTrack}" data-direcao="-1" aria-label="Ver vídeos anteriores de ${bloco.nicho}" hidden>${ICONE_SETA_ESQ}</button>
            <div class="video-track" id="${idTrack}">${cards}</div>
            <button type="button" class="scroll-seta scroll-seta-dir" data-alvo="${idTrack}" data-direcao="1" aria-label="Ver mais vídeos de ${bloco.nicho}">${ICONE_SETA_DIR}</button>
          </div>
        </div>
      `;
    }).join('');
  }

  // Cada vídeo começa como uma "fachada" (capa + botão de play simples, sem nada do
  // YouTube visível). Só ao clicar é que o player de verdade é carregado, já tocando.
  function configurarPlayVideos(){
    document.getElementById('nichos-videos').addEventListener('click', (evento) => {
      const botao = evento.target.closest('.video-card');
      if(!botao) return;
      const id = botao.dataset.youtube;
      const titulo = botao.dataset.titulo;

      const iframe = document.createElement('iframe');
      iframe.className = 'video-foto';
      iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&playsinline=1`;
      iframe.title = titulo;
      iframe.loading = 'lazy';
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
      iframe.allowFullscreen = true;

      botao.replaceWith(iframe);
    });
  }

  // Setas de cada nicho: rolam a faixa de vídeos sem mudar de página, e somem
  // sozinhas quando não há mais o que rolar naquela direção.
  function configurarSetasScroll(){
    document.querySelectorAll('.video-scroll-wrap').forEach(wrap => {
      const track = wrap.querySelector('.video-track');
      const setaEsq = wrap.querySelector('.scroll-seta-esq');
      const setaDir = wrap.querySelector('.scroll-seta-dir');

      function atualizarSetas(){
        const maximo = track.scrollWidth - track.clientWidth - 2;
        setaEsq.hidden = track.scrollLeft <= 4;
        setaDir.hidden = maximo <= 4 || track.scrollLeft >= maximo;
      }

      [setaEsq, setaDir].forEach(seta => {
        seta.addEventListener('click', () => {
          const direcao = Number(seta.dataset.direcao);
          track.scrollBy({ left: direcao * track.clientWidth * 0.85, behavior: 'smooth' });
        });
      });

      track.addEventListener('scroll', atualizarSetas);
      window.addEventListener('resize', atualizarSetas);
      atualizarSetas();
    });
  }

  function montarRodape(){
    const redes = [
      { label: 'Instagram', href: CONFIG.contato.instagramUrl, icone: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg>' },
      { label: 'WhatsApp', href: `https://wa.me/${CONFIG.contato.whatsappNumero}`, icone: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M20 12a8 8 0 1 1-3.6-6.7"/><path d="M20 12l1.2-4.4L17 9"/></svg>' },
      { label: 'E-mail', href: `mailto:${CONFIG.contato.email}`, icone: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>' }

  }

  /* ============================================================================================
     INTERAÇÕES: menu mobile e animação de entrada
     ============================================================================================ */
  function configurarMenuMobile(){
    const botao = document.getElementById('botao-menu');
    const menu = document.getElementById('nav-mobile');

    function fecharMenu(){
      botao.classList.remove('aberto');
      menu.classList.remove('aberto');
      botao.setAttribute('aria-expanded', 'false');
      botao.setAttribute('aria-label', 'Abrir menu');
    }

    botao.addEventListener('click', () => {
      const aberto = menu.classList.toggle('aberto');
      botao.classList.toggle('aberto', aberto);
      botao.setAttribute('aria-expanded', String(aberto));
      botao.setAttribute('aria-label', aberto ? 'Fechar menu' : 'Abrir menu');
    });

    menu.addEventListener('click', (evento) => {
      if(evento.target.tagName === 'A') fecharMenu();
    });

    document.addEventListener('keydown', (evento) => {
      if(evento.key === 'Escape') fecharMenu();
    });
  }

  function configurarAnimacaoEntrada(){
    const observador = new IntersectionObserver((entradas) => {
      entradas.forEach(entrada => {
        if(entrada.isIntersecting){
          entrada.target.classList.add('visivel');
          observador.unobserve(entrada.target);
        }
      });
    }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

    document.querySelectorAll('.revelar').forEach(el => observador.observe(el));
  }

  document.addEventListener('DOMContentLoaded', () => {
    montarCabecalho();
    montarGaleriaVideos();
    montarRodape();
    configurarMenuMobile();
    configurarAnimacaoEntrada();
    configurarPlayVideos();
    configurarSetasScroll();
  });
</script>
